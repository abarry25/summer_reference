function StepBox({ step, index }) {
  const s = TYPE_STYLES[step.type] || TYPE_STYLES.program;
  return (
    <div className="step-col">
      <div className="step-type-label" style={{ color: s.text }}>Step {index + 1} · {s.label}</div>
      <div className="step-box" style={{ background: s.bg, borderColor: s.border }}>
        <div className="step-name" style={{ color: s.text }}>{step.name}</div>
        <div className="step-note" style={{ color: s.text }}>{step.note}</div>
      </div>
    </div>
  );
}

function ArrowCell() {
  return (
    <div className="arrow-cell">
      <div style={{ position: "relative", width: "100%", height: 1, background: "#B4B2A9" }}>
        <span style={{ position: "absolute", right: -6, top: -8, fontSize: 13, color: "#888780" }}>›</span>
      </div>
    </div>
  );
}

function SectorRow({ sector, personaColor, personaLight }) {
  return (
    <div className="sector-row">
      <div className="sector-row-head" style={{ background: personaLight, borderBottomColor: "#D3D1C7" }}>
        <span>{sector.emoji}</span>
        <span className="sector-row-head-label" style={{ color: personaColor }}>{sector.label}</span>
        {sector.hasOverride && (
          <span className="sector-override-note" style={{ color: personaColor }}>
            ⚡ {sector.overrideLabel}
          </span>
        )}
      </div>
      <div className="steps-row">
        <StepBox step={sector.step1} index={0} />
        <ArrowCell />
        <StepBox step={sector.step2} index={1} />
        <ArrowCell />
        <StepBox step={sector.step3} index={2} />
      </div>
    </div>
  );
}

function ScoredPersonaCard({ persona, isOpen, onToggle }) {
  const [view, setView] = useState("all");
  const activeSector = persona.sectors.find(s => s.id === view);

  return (
    <div className="persona-card" style={{ borderColor: persona.color }}>
      <button
        className="persona-header"
        style={{ background: persona.light }}
        onClick={onToggle}
      >
        <span className="persona-emoji">{persona.emoji}</span>
        <div className="persona-meta">
          <div className="persona-name-row">
            <span className="persona-name" style={{ color: persona.color }}>{persona.label}</span>
            <span className="persona-sub" style={{ color: persona.color }}>· {persona.subtitle}</span>
          </div>
          <div className="persona-trigger" style={{ color: persona.color }}>Scored: {persona.trigger}</div>
        </div>
        <span className="chevron" style={{ color: persona.color }}>{isOpen ? "▲ collapse" : "▼ expand"}</span>
      </button>

      {isOpen && (
        <div className="persona-body">
          <div className="sector-tabs">
            <span className="sector-tab-label">View by sector:</span>
            {[{ id: "all", label: "All sectors", emoji: "" }, ...persona.sectors.map(s => ({ id: s.id, label: s.label, emoji: s.emoji }))].map(opt => (
              <button
                key={opt.id}
                className={"sector-tab" + (view === opt.id ? " active" : "")}
                style={{ "--pc": persona.color, "--pl": persona.light }}
                onClick={() => setView(opt.id)}
              >
                {opt.emoji} {opt.label}
              </button>
            ))}
          </div>

          <div className="sector-rows">
            {view === "all"
              ? persona.sectors.map(s => <SectorRow key={s.id} sector={s} personaColor={persona.color} personaLight={persona.light} />)
              : activeSector ? <SectorRow sector={activeSector} personaColor={persona.color} personaLight={persona.light} /> : null
            }
          </div>

          <div className="sector-note">
            <strong>How sector overrides work:</strong> For each step, the system checks for a sector-specific row first.
            If one exists (marked ⚡), it replaces the default. Otherwise the default row fires.
            Sectors marked ⚡ above have an explicit step 1 override for this persona; others fall to the default path.
          </div>
        </div>
      )}
    </div>
  );

            <div className="steps-row">
              {persona.steps.map((step, i) => (
                <React.Fragment key={i}>
                  <StepBox step={step} index={i} />

          <div className="fallback-row">
            <span className="fallback-icon">↩</span>
            <span className="fallback-text">{persona.fallback}</span>
          </div>
        </div>
      )}
    </div>
  );
}

      <h1 className="page-title">Founder Journey Flows</h1>
      <p className="page-desc">
        Six personas × four sectors. Each row shows the exact resources the wayfinder recommends —
        sourced directly from the <code>STEPS_DATA</code> lookup table in <code>ilab-data.js</code>.
        Hard overrides (💚 Impact, 🤝 Community) bypass scoring entirely and route based on a single answer.
      </p>

      <div className="legend">
        <span className="legend-label">Resource types:</span>
        {Object.entries(TYPE_STYLES).map(([type, s]) => (
          <span key={type} className="legend-pill" style={{ background: s.bg, borderColor: s.border, color: s.text }}>
            {s.label}
          </span>
        ))}
        <span style={{ fontSize: 10, color: "#888780", marginLeft: 6 }}>⚡ = sector-specific step 1 override</span>
      </div>

      <div className="controls">
        <button className="btn-sm" onClick={() => setOpen(new Set(PERSONAS.map(p => p.id)))}>Expand all</button>
        <button className="btn-sm" onClick={() => setOpen(new Set())}>Collapse all</button>
      </div>

      <div className="persona-list">
        {PERSONAS.map(p => p.isOverride
          ? <OverridePersonaCard key={p.id} persona={p} isOpen={open.has(p.id)} onToggle={() => toggle(p.id)} />
          : <ScoredPersonaCard   key={p.id} persona={p} isOpen={open.has(p.id)} onToggle={() => toggle(p.id)} />
        )}
      </div>

      <div className="scoring-box">
        <div className="scoring-title">Scoring reference — calcPersona() point table</div>
        <div className="scoring-grid">
          {[
            { q: "Stage = Explore",      s: "Explorer +5" },
            { q: "Stage = Test",         s: "Validator +3, Builder +2" },
            { q: "Stage = Propel",       s: "Propeller +5, Builder +1" },
            { q: "Goal = Feedback",      s: "Explorer +2, Validator +3" },
            { q: "Goal = Milestones",    s: "Builder +3, Validator +1" },
            { q: "Goal = Community",     s: "Explorer +2, Validator +1" },
            { q: "Goal = Funding",       s: "Propeller +3, Builder +1" },
            { q: "Time = Moderate",      s: "Explorer +1, Validator +2" },
            { q: "Time = Heavy",         s: "Builder +3, Propeller +1" },
          ].map(r => (
            <div key={r.q} className="scoring-cell">
              <div className="scoring-cell-label">{r.q}</div>
              <div className="scoring-cell-val">{r.s}</div>
            </div>
          ))}
        </div>
        <div className="scoring-footnote">
          Hard overrides fire before scoring: Social Impact → 💚 Impact · Light time → 🤝 Community. First match wins, skips the table above entirely.
        </div>
      </div>

      <div className="footer">Harvard Innovation Labs · Summer 2026 · journey_flows.html</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
