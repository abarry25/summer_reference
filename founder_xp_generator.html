<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #f7f6f4;
      --white:          #ffffff;
      --black:          #0d0d0d;
      --text:           #1c1c1c;
      --text-muted:     #5c5c5c;
      --text-light:     #9a9a9a;
      --border:         #e0dedd;
      --accent:         #c41230;
      --accent-hover:   #a30e26;
      --accent-light:   #fff0f0;
      --remote-bg:      #dcfce7;   --remote-text:   #15803d;
      --inperson-bg:    #dbeafe;   --inperson-text: #1d4ed8;
      --hybrid-bg:      #fef3c7;   --hybrid-text:   #b45309;
      --tbd-bg:         #f3f4f6;   --tbd-text:      #6b7280;
      --radius:         14px;
      --radius-sm:      10px;
      --shadow:         0 1px 4px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 660px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .site-header { margin-bottom: 40px; }
    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Card */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow);
    }

    /* Animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .22s ease forwards; }

    /* ── START SCREEN ── */
    .start-tag {
      display: inline-block;
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px;
    }
    .start-h1 {
      font-size: 30px; font-weight: 700;
      color: var(--black); line-height: 1.3; margin-bottom: 14px;
    }
    .start-p {
      font-size: 16px; color: var(--text-muted);
      line-height: 1.75; margin-bottom: 30px;
    }
    .start-meta { margin-top: 14px; font-size: 12px; color: var(--text-light); }

    /* ── QUESTION SCREEN ── */
    .q-num {
      font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--text-light); margin-bottom: 10px;
    }
    .q-headline {
      font-size: 24px; font-weight: 700;
      color: var(--black); line-height: 1.35; margin-bottom: 6px;
    }
    .q-subtext { font-size: 14px; color: var(--text-muted); margin-bottom: 26px; }
    .q-helper  { font-size: 13px; color: var(--text-light); font-style: italic; margin-top: 14px; }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; }

    .option {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color .12s, background .12s;
      -webkit-user-select: none; user-select: none;
    }
    .option:hover        { border-color: var(--accent); background: var(--accent-light); }
    .option.is-selected  { border-color: var(--accent); background: var(--accent-light); }

    .opt-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0; margin-top: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .12s, background .12s;
    }
    .option.is-selected .opt-dot { border-color: var(--accent); background: var(--accent); }
    .opt-dot::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: transparent; }
    .option.is-selected .opt-dot::after { background: white; }

    /* Checkbox variant */
    .option.is-check .opt-dot { border-radius: 5px; }
    .option.is-check.is-selected .opt-dot::after {
      content: '✓'; background: transparent;
      color: white; font-size: 11px; font-weight: 700; line-height: 1;
    }

    .opt-text { flex: 1; }
    .opt-label { font-size: 15px; font-weight: 600; color: var(--black); line-height: 1.4; }
    .opt-sub   { font-size: 13px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }

    /* Validation */
    .val-msg { font-size: 13px; color: var(--accent); font-weight: 500; margin-bottom: 14px; display: none; }
    .val-msg.show { display: block; }

    /* Button row */
    .btn-row { display: flex; align-items: center; justify-content: space-between; }

    .btn-primary {
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius-sm);
      padding: 13px 26px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .12s;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-back {
      background: none; border: none;
      font-size: 14px; color: var(--text-muted);
      font-family: inherit; cursor: pointer; padding: 0;
    }
    .btn-back:hover { color: var(--text); }

    /* ── RESULTS ── */
    .results-eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 100px;
      background: var(--accent-light); color: var(--accent);
      border: 1px solid #fecaca;
    }
    .results-headline {
      font-size: 22px; font-weight: 700;
      color: var(--black); line-height: 1.4; margin-bottom: 24px;
    }
    .section-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--text-light); margin-bottom: 10px;
    }
    .results-section {
      margin-top: 32px; padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    /* Program cards */
    .prog-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 18px; margin-bottom: 10px;
    }
    .prog-card.is-primary { border-color: var(--accent); }
    .prog-card-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px; margin-bottom: 8px;
    }
    .prog-name { font-size: 15px; font-weight: 600; color: var(--black); line-height: 1.4; }
    .rec-badge {
      font-size: 9px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      background: var(--accent); color: white;
      padding: 2px 7px; border-radius: 100px;
      white-space: nowrap; flex-shrink: 0;
    }
    .prog-desc  { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; }
    .prog-warn  { font-size: 12px; color: var(--accent); font-weight: 500; margin-bottom: 8px; }
    .prog-foot  { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }

    .fmt-label {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 100px;
    }
    .fmt-label.REMOTE   { background: var(--remote-bg);   color: var(--remote-text); }
    .fmt-label.INPERSON { background: var(--inperson-bg); color: var(--inperson-text); }
    .fmt-label.HYBRID   { background: var(--hybrid-bg);   color: var(--hybrid-text); }
    .fmt-label.TBD      { background: var(--tbd-bg);      color: var(--tbd-text); }

    .prog-link { font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none; }
    .prog-link:hover { text-decoration: underline; }
    .prog-link.is-tbd { color: var(--text-light); cursor: default; }
    .prog-link.is-tbd:hover { text-decoration: none; }

    .fmt-mismatch { font-size: 11px; color: var(--hybrid-text); font-style: italic; width: 100%; }

    /* Primer card */
    .primer-card {
      background: #f0f9ff; border: 1.5px solid #bae6fd;
      border-radius: var(--radius-sm); padding: 18px; margin-bottom: 10px;
    }
    .primer-card .prog-name { color: #075985; }
    .primer-card .prog-desc { color: #0369a1; }
    .primer-step { font-size: 13px; font-weight: 600; color: #0369a1; margin-bottom: 10px; }

    /* SIFF card */
    .siff-card {
      background: #f0fdf4; border: 1.5px solid #86efac;
      border-radius: var(--radius-sm); padding: 18px;
    }
    .siff-eyebrow {
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--remote-text); margin-bottom: 6px;
    }

    /* Gap note */
    .gap-note {
      font-size: 12px; color: var(--text-light); font-style: italic;
      background: var(--bg);
      border-left: 3px solid var(--border);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 14px; margin-bottom: 16px; line-height: 1.6;
    }

    /* Community grid */
    .community-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .community-grid .prog-card  { margin-bottom: 0; }
    .community-grid .prog-name  { font-size: 13px; }
    .community-grid .prog-desc  { font-size: 12px; margin: 4px 0 8px; }
    .community-grid .prog-link  { font-size: 12px; }

    /* Window Shopper CTA */
    .ws-cta {
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 20px; text-align: center;
      font-size: 14px; color: var(--text-muted);
      margin-top: 24px; line-height: 1.7;
    }
    .ws-cta a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .ws-cta a:hover { text-decoration: underline; }

    /* Restart */
    .restart-row {
      text-align: center; margin-top: 48px;
      padding-top: 32px; border-top: 1px solid var(--border);
    }
    .restart-row a { font-size: 14px; color: var(--text-muted); text-decoration: none; }
    .restart-row a:hover { color: var(--accent); }

    /* Responsive */
    @media (max-width: 520px) {
      .card { padding: 24px 18px; }
      .q-headline { font-size: 20px; }
      .start-h1 { font-size: 25px; }
      .community-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  PROPEL_GENERAL:      { primary: ['TECHSTARS','YC'], secondary: ['AI_AGENTS','AI_PR','INVESTOR_PREP'] }
};

// Results page header copy — keyed by stage
const HEADERS = {
  EXPLORE:        "Here's where to start — matched to where you are and what you're building.",
  TEST:           "Here's how to get real answers from real people — fast.",
  PROPEL:         "Here's how to build momentum and get in front of the right people.",
  WINDOW_SHOPPER: "Here's what fits a 1–3 hour/week commitment right now."
};

// Human-readable labels for result tags
const LABELS = {
  EXPLORE: 'Explore', TEST: 'Test', PROPEL: 'Propel',
  LIFESCI: 'Life Sci / Health', CLIMATE: 'Climate',
  DEEPTECH: 'Deep Tech / AI', SOCIALIMPACT: 'Social Impact', GENERAL: 'General',
  TIME_LOW: '1–3 hrs/wk', TIME_MID: '4–10 hrs/wk', TIME_HIGH: '10+ hrs/wk'
};

// Quiz questions
const QUESTIONS = [
  {
    id: 'stage', num: 'Q1 of 5', type: 'single',
    headline: "Where are you in your founder journey?",
    helper: "Not sure? Pick the one that feels closest.",
    opts: [
      { label: '🔍 Explore', sub: "I have an idea — or a few — and I'm figuring out if there's something real here", val: 'EXPLORE' },
      { label: '🧪 Test',    sub: "I have a specific problem I'm solving and I'm starting to talk to customers or build early versions", val: 'TEST' },
      { label: '🚀 Propel',  sub: "I have early traction and I'm focused on growth, fundraising, or scaling", val: 'PROPEL' }
    ]
  },
  {
    id: 'time', num: 'Q2 of 5', type: 'single',
    headline: "How much time can you commit to i-lab programs each week?",
    opts: [
      { label: '1–3 hours',  sub: "I want to stay connected but keep it light for now", val: 'TIME_LOW' },
      { label: '4–10 hours', sub: "I can show up regularly and do some work between sessions", val: 'TIME_MID' },
      { label: '10+ hours',  sub: "I'm ready to go deep and make this a real priority", val: 'TIME_HIGH' }
    ]
  },
  {
    id: 'needs', num: 'Q3 of 5', type: 'multi',
    headline: "What do you need most right now?",
    subtext: "Pick at least one — this shapes your recommendations.",
    opts: [
      { label: '🤝 A co-founder or collaborator',              val: 'NEED_COFOUNDER' },
      { label: "👥 Peer community — people who get what I'm building", val: 'NEED_COMMUNITY' },
      { label: '🧭 Mentorship or expert feedback',             val: 'NEED_MENTORSHIP' },
      { label: '💰 Fundraising or investor connections',       val: 'NEED_FUNDING' },
      { label: '✨ Inspiration from other founders',           val: 'NEED_INSPIRATION' },
      { label: '🛠 Feedback on my product or MVP',             val: 'NEED_MVP' },
      { label: '🎤 Pitching practice',                         val: 'NEED_PITCH' }
    ]
  },
  {
    id: 'format', num: 'Q4 of 5', type: 'single',
    headline: "How do you prefer to participate?",
    opts: [
      { label: '🟢 Remote',    sub: "I work best online — show me virtual options", val: 'FORMAT_REMOTE' },
      { label: '🟡 Hybrid',    sub: "I like a mix of in-person and virtual",        val: 'FORMAT_HYBRID' },
      { label: '🔵 In-Person', sub: "I want to be in the room",                     val: 'FORMAT_INPERSON' }
    ]
  },
  {
    id: 'sector', num: 'Q5 of 5', type: 'single',
    headline: "What space are you building in?",
    opts: [
      { label: '🧬 Life Sciences / Health Care', sub: "Biotech, medtech, health services, pharma",          val: 'LIFESCI' },
      { label: '🌱 Climate / Sustainability',    sub: "Clean energy, climate tech, environmental impact",   val: 'CLIMATE' },
      { label: '⚙️ Deep Tech / AI / Engineering',sub: "Hard tech, AI, robotics, software infrastructure",  val: 'DEEPTECH' },
      { label: '💙 Social Impact',               sub: "Mission-driven ventures, nonprofits, social enterprise", val: 'SOCIALIMPACT' },
      { label: '🌐 General / Not sure yet',      sub: "Across industries or still exploring the problem space", val: 'GENERAL' }
    ]
  }
];


// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let S = {
  screen: 'start',   // 'start' | 'question' | 'ws' | 'results'
  qIdx: 0,
  ans: { stage: null, time: null, needs: [], format: null, sector: null }
};


// ════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════
function lnk(key) { return LINKS[key] || '#'; }

function fmtBadge(fmt) {
  const map = {
    REMOTE:   ['🟢','Remote'],
    INPERSON: ['🔵','In-Person'],
    HYBRID:   ['🟡','Hybrid'],
    TBD:      ['⚪','Format TBD']
  };
  const [ico, txt] = map[fmt] || map.TBD;
  return `<span class="fmt-label ${fmt}">${ico} ${txt}</span>`;
}

function mismatchNote(progFmt, userFmt) {
  const map = { FORMAT_REMOTE:'REMOTE', FORMAT_HYBRID:'HYBRID', FORMAT_INPERSON:'INPERSON' };
  const pref = map[userFmt];
  if (!pref || progFmt === 'TBD' || progFmt === pref) return '';
  const names = { REMOTE:'Remote', INPERSON:'In-Person', HYBRID:'Hybrid' };
  return `<div class="fmt-mismatch">⚠️ This program is ${names[progFmt]} — your preference was ${names[pref]}</div>`;
}

function matrixKey() {
  const { stage, time, sector } = S.ans;
  if (stage === 'TEST') return `TEST_${sector}_${time === 'TIME_HIGH' ? 'HIGH' : 'MID'}`;
  return `${stage}_${sector}`;
}


// ════════════════════════════════════════════════════════════════
//  CARD RENDERERS
// ════════════════════════════════════════════════════════════════
function progCard(p, isPrimary, userFmt) {
  const badge    = isPrimary ? `<span class="rec-badge">Recommended</span>` : '';
  const warnEl   = p.warning  ? `<div class="prog-warn">⚠️ ${p.warning}</div>` : '';
  const mismatch = userFmt    ? mismatchNote(p.format, userFmt) : '';
  const linkEl   = p.isTBD
    ? `<span class="prog-link is-tbd">Link coming soon</span>`
    : `<a href="${lnk(p.linkKey)}" target="_blank" class="prog-link">${p.linkLabel || 'Sign up'} →</a>`;

  if (p.isPrimer) {
    return `
      <div class="primer-card fade-up">
        <div class="prog-card-head">
          <div class="prog-name">${p.name}</div>${badge}
        </div>
        <div class="prog-desc">${p.desc}</div>
        <div class="primer-step">Step 1: Sign up below — we'll take it from there.</div>
        <div class="prog-foot">
          ${fmtBadge(p.format)}
          <a href="${lnk(p.linkKey)}" target="_blank" class="prog-link" style="color:#0369a1;">Sign up →</a>
        </div>
      </div>`;
  }

  return `
    <div class="prog-card ${isPrimary ? 'is-primary' : ''} fade-up">
      <div class="prog-card-head">
        <div class="prog-name">${p.name}</div>${badge}
      </div>
      <div class="prog-desc">${p.desc}</div>
      ${warnEl}${mismatch}
      <div class="prog-foot">${fmtBadge(p.format)}${linkEl}</div>
    </div>`;
}

function miniCard(p) {
  return `
    <div class="prog-card fade-up" style="margin-bottom:0;">
      <div class="prog-name" style="font-size:13px;">${p.name}</div>
      <div class="prog-desc" style="font-size:12px;margin:4px 0 8px;">${p.desc}</div>
      <div class="prog-foot">
        ${fmtBadge(p.format)}
        <a href="${lnk(p.linkKey)}" target="_blank" class="prog-link" style="font-size:12px;">Sign up →</a>
      </div>
    </div>`;
}


// ════════════════════════════════════════════════════════════════
//  SCREEN RENDERERS
// ════════════════════════════════════════════════════════════════
function screenStart() {
  return `
    <div class="card fade-up">
      <div class="start-tag">Program Finder · Summer 2026</div>
      <h1 class="start-h1">Find the right program for where you are right now.</h1>
      <p class="start-p">5 questions. Less than 2 minutes. We'll match you to i-lab programs based on your stage, what you're building, and what you actually need.</p>
      <button class="btn-primary" onclick="go('start')">Get started →</button>
      <p class="start-meta">Summer 2026 · Harvard Innovation Labs</p>
    </div>`;
}

function screenQuestion(idx) {
  const q = QUESTIONS[idx];
  const isMulti = q.type === 'multi';
  const selected = isMulti ? S.ans.needs : (S.ans[q.id] ? [S.ans[q.id]] : []);
  const isLast   = idx === QUESTIONS.length - 1;

  const opts = q.opts.map(o => `
    <div class="option ${isMulti ? 'is-check' : ''} ${selected.includes(o.val) ? 'is-selected' : ''}"
         onclick="pick('${q.id}','${o.val}',${isMulti})">
      <div class="opt-dot"></div>
      <div class="opt-text">
        <div class="opt-label">${o.label}</div>
        ${o.sub ? `<div class="opt-sub">${o.sub}</div>` : ''}
      </div>
    </div>`).join('');

  const backBtn = idx > 0
    ? `<button class="btn-back" onclick="go('back')">← Back</button>`
    : `<div></div>`;

  return `
    <div class="card fade-up">
      <div class="q-num">${q.num}</div>
      <h2 class="q-headline">${q.headline}</h2>
      ${q.subtext ? `<p class="q-subtext">${q.subtext}</p>` : ''}
      <div class="options">${opts}</div>
      <div class="val-msg" id="val-msg">Select at least one to continue.</div>
      <div class="btn-row">
        ${backBtn}
        <button class="btn-primary" onclick="go('next',${idx})">
          ${isLast ? "Show me what's next →" : "Next →"}
        </button>
      </div>
      ${q.helper ? `<p class="q-helper">${q.helper}</p>` : ''}
    </div>`;
}

function screenWindowShopper() {
  const events = [
    { name: "Founder/Joiner: Pizza + Pitch",           format: "INPERSON", linkKey: "FOUNDER_JOINER",          desc: "Pitch what you're working on and connect with potential collaborators over pizza." },
    { name: "Founder Circle: Pizza + Problem-Solving", format: "INPERSON", linkKey: "FOUNDER_CIRCLE_INPERSON", desc: "Bring your biggest challenge. Get peer input. Leave with fresh ideas." },
    { name: "Virtual Founder Circle",                  format: "REMOTE",   linkKey: "FOUNDER_CIRCLE_VIRTUAL",  desc: "The same peer energy — on Zoom." },
    { name: "Summer Launch Party at Felipe's",         format: "INPERSON", linkKey: "LAUNCH_PARTY",            desc: "Connect with founders over quesadillas at everyone's favorite Cambridge taqueria." },
    { name: "Member Appreciation: Tacos & Thanks",     format: "INPERSON", linkKey: "MEMBER_APPRECIATION",     desc: "A celebration for i-lab community members with local food trucks." },
    { name: "Founder Talk: Allison Byers",             format: "INPERSON", linkKey: "TALK_BYERS",              desc: "Author of Fundraising for the Rest of Us — lessons on fundraising and building your path." },
    { name: "Founder Talk: Brian Elliott + Murph VanderVelde", format: "INPERSON", linkKey: "TALK_ELLIOTT",   desc: "Inside Blitzy — one of Boston's fastest-growing AI companies." },
    { name: "Venture Incubation Ceremony",             format: "INPERSON", linkKey: "VIP_CEREMONY",            desc: "Celebrate founders advancing through the venture incubation program." }
  ];

  return `
    <div class="fade-up">
      <button class="btn-back" onclick="go('back')" style="margin-bottom:20px;">← Back</button>
      <div class="results-eyebrow">Your results</div>
      <h2 class="results-headline">${HEADERS.WINDOW_SHOPPER}</h2>
      ${events.map(p => progCard(p, false)).join('')}
      <div class="ws-cta">
        When you're ready to go deeper,
        <a href="#" onclick="go('restart');return false;">come back and retake the quiz</a>.
      </div>
    </div>`;
}

function screenResults() {
  const { stage, sector, time, needs, format } = S.ans;
  const key = matrixKey();
  const r = MATRIX[key];
  if (!r) return `<div class="card">Something went wrong. <a href="#" onclick="go('restart');return false;">Start over</a></div>`;

  // Tags
  const tags = [LABELS[stage], LABELS[sector], LABELS[time]]
    .map(t => `<span class="tag">${t}</span>`).join('');

  // Gap note
  const gapEl = r.gapNote ? `<div class="gap-note">ℹ️ ${r.gapNote}</div>` : '';

  // Primary recommendation(s)
  let primaryEl = `<div class="section-label">Recommended for you</div>`;
  if (Array.isArray(r.primary)) {
    primaryEl += r.primary.map(k => progCard(PROGRAMS[k], true, format)).join('');
  } else {
    primaryEl += progCard(PROGRAMS[r.primary], true, format);
  }

  // Secondary recommendations
  let secEl = '';
  if (r.secondary && r.secondary.length) {
    const cards = r.secondary
      .filter(k => PROGRAMS[k])
      .map(k => progCard(PROGRAMS[k], false, format)).join('');
    secEl = `<div class="results-section"><div class="section-label">Also worth exploring</div>${cards}</div>`;
  }

  // Needs-based actions (deduplicated)
  let needsEl = '';
  if (needs.length) {
    const seen  = new Set();
    const cards = needs
      .filter(n => NEEDS[n])
      .flatMap(n => NEEDS[n])
      .filter(p => { if (seen.has(p.linkKey)) return false; seen.add(p.linkKey); return true; })
      .map(p => progCard(p, false, format)).join('');
    if (cards) needsEl = `<div class="results-section"><div class="section-label">Based on what you need</div>${cards}</div>`;
  }

  // SIFF callout (Social Impact only)
  const siffEl = r.siff ? `
    <div class="results-section">
      <div class="siff-card fade-up">
        <div class="siff-eyebrow">Competitive Program</div>
        <div class="prog-name" style="color:#166534;margin-bottom:8px;">🌱 SIFF Fund</div>
        <div class="prog-desc" style="color:#166534;opacity:.85;">
          A competitive program for 6 teams with months of coaching and funding support.
          Applications open each semester.
        </div>
        <div class="prog-foot" style="margin-top:12px;">
          ${fmtBadge('REMOTE')}
          <a href="${lnk('SIFF_APPLICATION')}" target="_blank" class="prog-link" style="color:#166534;">
            Learn more + apply →
          </a>
        </div>
      </div>
    </div>` : '';

  // Community block
  const communityEl = `
    <div class="results-section">
      <div class="section-label">Also happening →</div>
      <div class="community-grid">${COMMUNITY.map(p => miniCard(p)).join('')}</div>
    </div>`;

  return `
    <div class="fade-up">
      <div class="results-eyebrow">Your results</div>
      <div class="tag-row">${tags}</div>
      <h2 class="results-headline">${HEADERS[stage]}</h2>
      ${gapEl}
      ${primaryEl}
      ${secEl}
      ${needsEl}
      ${siffEl}
      ${communityEl}
      <div class="restart-row">
        <a href="#" onclick="go('restart');return false;">↺ Retake the quiz</a>
      </div>
    </div>`;
}


// ════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════
function render(scrollToTop) {
  const app = document.getElementById('app');
  if      (S.screen === 'start')    app.innerHTML = screenStart();
  else if (S.screen === 'question') app.innerHTML = screenQuestion(S.qIdx);
  else if (S.screen === 'ws')       app.innerHTML = screenWindowShopper();
  else if (S.screen === 'results')  app.innerHTML = screenResults();
  if (scrollToTop !== false) window.scrollTo({ top: 0, behavior: 'smooth' });
}


// ════════════════════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════════════════════
function go(action, idx) {
  if (action === 'start') {
    S.screen = 'question'; S.qIdx = 0; render();

  } else if (action === 'restart') {
    S = { screen: 'start', qIdx: 0, ans: { stage: null, time: null, needs: [], format: null, sector: null } };
    render();

  } else if (action === 'back') {
    if (S.screen === 'ws') {
      // Return to Q2 so user can change time commitment
      S.screen = 'question'; S.qIdx = 1; render();
    } else if (S.qIdx > 0) {
      S.qIdx--; render();
    } else {
      S.screen = 'start'; render();
    }

  } else if (action === 'next') {
    const q = QUESTIONS[idx];

    // Validate Q3 multi-select
    if (q.type === 'multi' && S.ans.needs.length === 0) {
      document.getElementById('val-msg').classList.add('show');
      return;
    }
    // Require selection on single-select
    if (q.type === 'single' && !S.ans[q.id]) return;

    // Gate check after Q2
    if (idx === 1 && S.ans.time === 'TIME_LOW') {
      S.screen = 'ws'; render(); return;
    }

    // Advance to next question or show results
    if (idx < QUESTIONS.length - 1) {
      S.qIdx = idx + 1; render();
    } else {
      S.screen = 'results'; render();
    }
  }
}

// Handles option selection (both single and multi)
function pick(qId, val, isMulti) {
  if (isMulti) {
    const i = S.ans.needs.indexOf(val);
    i === -1 ? S.ans.needs.push(val) : S.ans.needs.splice(i, 1);
  } else {
    S.ans[qId] = val;
  }
  render(false); // re-render without scrolling
}

// Boot
render();
</script>
